<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400" role="img" aria-labelledby="title desc">
  <title id="title">DataSentinel Logo</title>
  <desc id="desc">Shield with bar-chart and checkmark icon next to the text DataSentinel</desc>

  <!-- Shield background -->
  <g id="icon" transform="translate(60,40)">
    <path d="M120 10 L60 0 L0 10 C0 10 0 150 60 190 L60 190 L60 190 C60 190 120 150 120 10 Z" 
          fill="none" stroke="#0b3d91" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
    <!-- Bars -->
    <rect x="25" y="70" width="18" height="70" rx="3" fill="#0b3d91"/>
    <rect x="50" y="50" width="18" height="90" rx="3" fill="#0b3d91"/>
    <rect x="75" y="30" width="18" height="110" rx="3" fill="#0b3d91"/>
    <!-- Checkmark -->
    <path d="M30 120 L50 140 L90 100" stroke="#2ecc71" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Wordmark -->
  <g id="wordmark" transform="translate(240,150)">
    <!-- Use an accessible, web-safe font family -->
    <text x="0" y="0" font-family="Inter, Roboto, Arial, Helvetica, sans-serif" font-weight="700" font-size="72" fill="#0b3d91">Data</text>
    <text x="160" y="0" font-family="Inter, Roboto, Arial, Helvetica, sans-serif" font-weight="400" font-size="72" fill="#233a63">Sentinel</text>
  </g>
</svg>
